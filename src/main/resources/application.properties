spring.application.name=auth-app

server.servlet.context-path=/api/v1

spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secretKey=${JWT_SECRET}

# Access token TTL in milliseconds (default: 10 minutes)
security.jwt.access-ttl-ms=600000
# Refresh token TTL in milliseconds (7 days)
security.jwt.refresh-ttl-ms=604800000

# Default session limit for users without a subscription plan
app.session.limit=2

# Session limits per subscription plan
app.session.limit.free=1
app.session.limit.basic=3
app.session.limit.premium=5

logging.level.vishal.project.auth_app.filter=DEBUG
logging.level.org.springframework.web=INFO
